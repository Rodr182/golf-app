# Configura el proyecto de Supabase de GolfBuddy usando la API de administración.
# Se ejecuta manualmente (workflow_dispatch). El token se lee del secreto
# SUPABASE_TOKEN del repositorio — nunca se guarda en el código ni en los logs.
name: Configurar Supabase

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar proyecto Supabase
        id: sb
        env:
          SB_TOKEN: ${{ secrets.SUPABASE_TOKEN }}
        run: |
          set -euo pipefail
          [ -n "$SB_TOKEN" ] || { echo "ERROR: falta el secreto SUPABASE_TOKEN en el repositorio"; exit 1; }
          api() { curl -sS -H "Authorization: Bearer $SB_TOKEN" -H "Content-Type: application/json" "$@"; }

          echo "== Buscando proyectos existentes =="
          projects=$(api https://api.supabase.com/v1/projects)
          echo "$projects" | jq -r '.[] | "\(.id) \(.name) \(.status)"' || { echo "ERROR: token invalido o sin acceso"; echo "$projects"; exit 1; }

          # Preferir un proyecto cuyo nombre contenga "golf"; si no, el primero; si no hay, crear uno.
          ref=$(echo "$projects" | jq -r '[.[] | select(.name | test("golf"; "i"))][0].id // empty')
          [ -z "$ref" ] && ref=$(echo "$projects" | jq -r '.[0].id // empty')

          if [ -z "$ref" ]; then
            echo "== No hay proyectos: creando uno nuevo =="
            org=$(api https://api.supabase.com/v1/organizations | jq -r '.[0].id')
            dbpass=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 24)
            created=$(api -X POST https://api.supabase.com/v1/projects \
              -d "{\"name\":\"golfbuddy\",\"organization_id\":\"$org\",\"db_pass\":\"$dbpass\",\"region\":\"sa-east-1\"}")
            ref=$(echo "$created" | jq -r '.id // empty')
            [ -z "$ref" ] && { echo "ERROR creando proyecto:"; echo "$created"; exit 1; }
          fi
          echo "Proyecto elegido: $ref"

          echo "== Esperando a que el proyecto este activo =="
          for i in $(seq 1 60); do
            status=$(api "https://api.supabase.com/v1/projects/$ref" | jq -r '.status')
            echo "  estado: $status"
            [ "$status" = "ACTIVE_HEALTHY" ] && break
            sleep 10
          done
          [ "$status" = "ACTIVE_HEALTHY" ] || { echo "ERROR: el proyecto no llego a estar activo"; exit 1; }

          echo "== Creando tabla y politicas (idempotente) =="
          sql='create table if not exists public.collections (key text primary key, value jsonb not null, updated_at timestamptz not null default now()); alter table public.collections enable row level security; drop policy if exists "authenticated can read" on public.collections; create policy "authenticated can read" on public.collections for select to authenticated using (true); drop policy if exists "authenticated can insert" on public.collections; create policy "authenticated can insert" on public.collections for insert to authenticated with check (true); drop policy if exists "authenticated can update" on public.collections; create policy "authenticated can update" on public.collections for update to authenticated using (true);'
          api -X POST "https://api.supabase.com/v1/projects/$ref/database/query" -d "$(jq -n --arg q "$sql" '{query:$q}')"
          echo ""

          echo "== Verificando la tabla =="
          api -X POST "https://api.supabase.com/v1/projects/$ref/database/query" -d '{"query":"select count(*) from public.collections;"}'
          echo ""

          echo "== Desactivando confirmacion de email =="
          api -X PATCH "https://api.supabase.com/v1/projects/$ref/config/auth" -d '{"mailer_autoconfirm":true}' | jq '{mailer_autoconfirm}'

          echo "== Obteniendo claves publicas =="
          keys=$(api "https://api.supabase.com/v1/projects/$ref/api-keys")
          anon=$(echo "$keys" | jq -r '.[] | select(.name=="anon") | .api_key')
          service=$(echo "$keys" | jq -r '.[] | select(.name=="service_role") | .api_key')
          echo "::add-mask::$service"
          url="https://$ref.supabase.co"

          echo "== Probando registro de cuenta (signup) =="
          resp=$(curl -sS -X POST "$url/auth/v1/signup" -H "apikey: $anon" -H "Content-Type: application/json" \
            -d '{"email":"prueba.golfbuddy@gmail.com","password":"prueba-123456"}')
          if echo "$resp" | jq -e '.access_token' > /dev/null; then
            echo "SIGNUP_TEST=ok"
            uid=$(echo "$resp" | jq -r '.user.id')
            curl -sS -X DELETE "$url/auth/v1/admin/users/$uid" -H "apikey: $service" -H "Authorization: Bearer $service" > /dev/null && echo "usuario de prueba eliminado"
          else
            echo "SIGNUP_TEST=fail"
            echo "$resp"
          fi

          echo "===================================="
          echo "RESULT_URL=$url"
          echo "===================================="
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "anon=$anon" >> "$GITHUB_OUTPUT"

      - name: Conectar la app (escribir config.js) y subir a main
        env:
          REF: ${{ steps.sb.outputs.ref }}
          ANON: ${{ steps.sb.outputs.anon }}
        run: |
          set -euo pipefail
          cat > frontend/src/config.js <<EOF
          /*
            Credenciales del proyecto Supabase (escritas automáticamente por
            .github/workflows/setup-supabase.yml). Son valores públicos por
            diseño: la seguridad la dan las políticas RLS de la base de datos.
            Si se dejan vacíos, la app vuelve al modo local (datos en el navegador).
          */
          export const SUPABASE_URL = "https://$REF.supabase.co";
          export const SUPABASE_ANON_KEY = "$ANON";
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/config.js
          if git diff --cached --quiet; then
            echo "config.js ya estaba al dia"
          else
            git commit -m "Conectar la app al proyecto Supabase (modo nube)"
            git push
            echo "config.js actualizado y subido"
          fi
